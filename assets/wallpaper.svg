<svg xmlns="http://www.w3.org/2000/svg" width="4096" height="2160" viewBox="0 0 4096 2160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040302"/>
      <stop offset="45%" stop-color="#020201"/>
      <stop offset="100%" stop-color="#060403"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="48%" r="76%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.44"/>
    </radialGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#000000" fill-opacity="0"/>
      <rect y="4" width="8" height="1" fill="#ce6a35" fill-opacity="0.05"/>
      <rect y="5" width="8" height="3" fill="#000000" fill-opacity="0.12"/>
    </pattern>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .frame { fill: none; stroke: #ce6a35; stroke-width: 3; stroke-opacity: 0.9; }
      .frame-soft { fill: none; stroke: #ce6a35; stroke-width: 2; stroke-opacity: 0.42; }
      .frame-faint { fill: none; stroke: #ce6a35; stroke-width: 1; stroke-opacity: 0.2; }
      .box-fill { fill: #050302; fill-opacity: 0.72; }
      .label {
        fill: #f07e36;
        font-size: 64px;
        font-weight: 700;
        letter-spacing: 1px;
        font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace;
      }
      .tiny {
        fill: #ce6a35;
        fill-opacity: 0.52;
        font-size: 22px;
        letter-spacing: 7px;
        font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace;
      }
      .title {
        fill: #e47734;
        font-size: 152px;
        font-weight: 700;
        letter-spacing: 1px;
        font-family: 'Liberation Serif', 'Noto Serif', serif;
      }
      .tm {
        fill: #f07e36;
        font-size: 74px;
        font-weight: 700;
        font-family: 'Liberation Serif', 'Noto Serif', serif;
      }
    </style>
  </defs>

