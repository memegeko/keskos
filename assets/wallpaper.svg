<svg xmlns="http://www.w3.org/2000/svg" width="4096" height="2160" viewBox="0 0 4096 2160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="55%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="75%" stop-color="#000000" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="#000000" fill-opacity="0"/>
      <rect y="4" width="8" height="1" fill="#ce6a35" fill-opacity="0.04"/>
      <rect y="5" width="8" height="3" fill="#000000" fill-opacity="0.12"/>
    </pattern>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="9" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .hud-line { fill: none; stroke: #ce6a35; stroke-width: 2; stroke-opacity: 0.22; }
      .hud-faint { fill: none; stroke: #ce6a35; stroke-width: 1; stroke-opacity: 0.12; }
      .hud-box { fill: rgba(0, 0, 0, 0.14); stroke: #ce6a35; stroke-width: 2; stroke-opacity: 0.2; }
      .hud-fill { fill: #ce6a35; fill-opacity: 0.06; }
      .hud-label { fill: #ce6a35; fill-opacity: 0.7; font-size: 28px; letter-spacing: 5px; font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace; }
      .hud-tiny { fill: #ce6a35; fill-opacity: 0.42; font-size: 24px; letter-spacing: 4px; font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace; }
      .hud-title { fill: #ce6a35; fill-opacity: 0.96; font-size: 112px; letter-spacing: 8px; font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace; }
      .hud-subtitle { fill: #ce6a35; fill-opacity: 0.92; font-size: 56px; letter-spacing: 6px; font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace; }
      .hud-tagline { fill: #ce6a35; fill-opacity: 0.84; font-size: 50px; letter-spacing: 5px; font-family: 'JetBrainsMono Nerd Font', 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="4096" height="2160" fill="url(#bg)"/>
  <rect width="4096" height="2160" fill="url(#scanlines)"/>
  <rect width="4096" height="2160" filter="url(#grain)" opacity="0.24"/>
  <rect width="4096" height="2160" fill="url(#vignette)"/>

  <g opacity="0.86">
    <path class="hud-line" d="M170 82h302"/>
    <path class="hud-line" d="M710 82h1724"/>
    <path class="hud-line" d="M2662 82h1218"/>
