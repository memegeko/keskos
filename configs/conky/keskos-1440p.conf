conky.config = {
  background = false,
  update_interval = 2,
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  override_utf8_locale = true,
  double_buffer = true,
  no_buffers = true,
  text_buffer_size = 8192,
  max_specials = 4096,
  imlib_cache_size = 0,
  use_xft = true,
  font = 'JetBrainsMono Nerd Font:size=14',
  xftalpha = 0.92,
  own_window = true,
  own_window_type = 'desktop',
  own_window_class = 'keskos-hud',
  own_window_argb_visual = true,
  own_window_argb_value = 0,
  own_window_transparent = true,
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  draw_shades = false,
  draw_outline = false,
  draw_borders = false,
  draw_graph_borders = false,
  stippled_borders = 0,
  border_inner_margin = 0,
  border_outer_margin = 0,
  default_color = '#ce6a35',
  default_outline_color = '#ce6a35',
  default_shade_color = '#000000',
  color1 = '#ce6a35',
  color2 = '#8f573a',
  color3 = '#1f0b04',
  alignment = 'top_left',
  gap_x = 0,
  gap_y = 0,
  minimum_width = 2560,
  minimum_height = 1440,
  maximum_width = 2560,
  uppercase = false,
  use_spacer = 'none',
};

conky.text = [[
${voffset 152}${execpi 180 ~/.local/bin/keskos-conky-block system-status 114 48 20 14}
${voffset -218}${execpi 60 ~/.local/bin/keskos-conky-block system-log 2010 48 20 14}
${voffset 206}${execpi 300 ~/.local/bin/keskos-conky-block core-modules 114 48 20 14}
${voffset -218}${execpi 180 ~/.local/bin/keskos-conky-block quick-access 2010 48 20 14}
${voffset 216}${execpi 6 ~/.local/bin/keskos-conky-block network 114 48 20 14 __NET_IFACE__}
${voffset -196}${execpi 10 ~/.local/bin/keskos-conky-block memory 2010 48 20 14}
]];
