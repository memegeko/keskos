backend = "xrender";
vsync = true;

shadow = true;
shadow-radius = 16;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.22;
shadow-red = 0.81;
shadow-green = 0.42;
shadow-blue = 0.21;

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

corner-radius = 0;
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
# Safer on older GPUs and virtual GPUs if picom is manually enabled.
use-damage = false;

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = true; };
  dropdown_menu = { shadow = true; };
};
