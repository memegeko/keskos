name: Build and Release ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build KeskOS ISO in an Arch Linux container
        env:
          KESKOS_CI: "1"
          KESKOS_ISO_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.run_number) }}
        run: |
          docker run --rm --privileged \
            -e KESKOS_CI \
            -e KESKOS_ISO_VERSION \
            -e SOURCE_DATE_EPOCH="$(date +%s)" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              pacman -Syu --noconfirm archlinux-keyring
              pacman -Syu --noconfirm archiso pacman-contrib git base-devel curl python sudo rsync grub syslinux
              chmod +x ./build.sh
              ./build.sh
            '

      - name: Generate checksums
        run: |
          cd out
          sha256sum *.iso > SHA256SUMS.txt

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: keskos-iso-${{ github.run_number }}
          path: |
            out/*.iso
            out/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*.iso
            out/SHA256SUMS.txt
